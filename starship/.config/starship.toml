# gov cluster: just the short name
[[kubernetes.contexts]]
context_pattern = 'gov-devops'
context_alias = 'gov'

# Shorten the rest: k8s-internal -> internal, k8s-live -> live, k8s-devops -> devops
[[kubernetes.contexts]]
